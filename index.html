<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyber Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: radial-gradient(circle at center, #120010, #000);
  color: #fff;
  overflow: hidden;
}

#stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  background: transparent;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0.6;
  animation: twinkle 2s infinite ease-in-out;
}

@keyframes twinkle {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.8); }
}

:root {
  --main: #ff2e9a;
  --glow: #ff4fbf;
}

#loadingScreen {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, #0a0008, #000);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.loader {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 4px solid rgba(255,255,255,0.08);
  border-top: 4px solid var(--main);
  animation: spin 1s linear infinite;
  box-shadow: 0 0 25px var(--glow);
  margin-bottom: 20px;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.loading-text {
  font-size: 20px;
  letter-spacing: 4px;
  color: var(--main);
  text-shadow: 0 0 12px var(--glow);
  font-family: "Orbitron", sans-serif;
}

.loading-sub {
  font-size: 12px;
  color: #aaa;
  margin-top: 6px;
  font-family: "Rajdhani", sans-serif;
}

.bar {
  width: 220px;
  height: 4px;
  background: rgba(255,255,255,0.08);
  margin-top: 18px;
  border-radius: 50px;
  overflow: hidden;
}

.progress {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, var(--main), #ffffff);
  animation: load 2.5s ease forwards;
  box-shadow: 0 0 10px var(--glow);
}

@keyframes load {
  0% { width: 0%; }
  100% { width: 100%; }
}

.main {
  display: none;
  height: 100vh;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  animation: fadeIn 1.2s ease forwards;
  position: relative;
  z-index: 2;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.98); }
  to { opacity: 1; transform: scale(1); }
}

.top-image {
  width: 280px;
  border-radius: 12px;
  border: 2px solid var(--main);
  box-shadow: 0 0 35px var(--glow);
  margin-bottom: 14px;
}

.card {
  width: 520px;
  padding: 18px;
  background: rgba(10, 0, 12, 0.8);
  border: 1px solid rgba(255, 46, 154, 0.4);
  border-radius: 14px;
  box-shadow: 0 0 40px rgba(255, 46, 154, 0.25);
  backdrop-filter: blur(10px);
  text-align: center;
}

.title {
  font-size: 36px;
  letter-spacing: 3px;
  color: var(--main);
  text-shadow: 0 0 18px var(--glow);
  font-family: "Orbitron", sans-serif;
  font-weight: 700;
  margin-bottom: 15px;
}

. {
  font-size: 16px;
  color: var(--main);
  margin-bottom: 10px;
  font-family: "Rajdhani", sans-serif;
}

.terminal {
  background: rgba(0,0,0,0.6);
  padding: 12px;
  border-radius: 10px;
  border: 1px solid rgba(255,46,154,0.3);
  font-size: 15px;
  line-height: 1.2;
  text-align: left;
  white-space: pre-line;
  font-family: "Share Tech Mono", monospace;
}

.cursor {
  display: inline-block;
  width: 8px;
  height: 14px;
  background: var(--main);
  margin-left: 4px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

.footer {
  margin-top: 12px;
  font-size: 11px;
  color: #aaa;
  letter-spacing: 2px;
  font-family: "Rajdhani", sans-serif;
}

.purple { color: var(--main); }
.gray { color: #bbb; }
.ilyas { color: #ff7ac8; text-shadow: 0 0 10px var(--glow); }

</style>
</head>

<body>

<div id="stars"></div>

<div id="loadingScreen">
  <div class="loader"></div>
  <div class="loading-text">INITIALIZING SYSTEM</div>
  <div class="loading-sub">loading secure environment...</div>

  <div class="bar">
    <div class="progress"></div>
  </div>
</div>

<div class="main" id="main">

  <img src="https://cdn.app.com/attachments/1495882838644490290/1497614850279342231/180f37f9d241985c23cee550893ea4ec.jpg?ex=69ee2a04&is=69ecd884&hm=500a9bb43e58947e3a4dd3427aa5522fd68b684b0466b4a5812e1a39a6b95121&" class="top-image">

  <div class="card">

    <div class="title">Hacked By Ilyas</div>

    <div class="discord">discord.gg/nvXYYEunF8</div>

    <div class="terminal">
      <div id="typing"></div><span class="cursor"></span>
    </div>

    <div class="footer">Officially Ilyas • Milfs Lovers</div>

  </div>
</div>

<script>

const starsContainer = document.getElementById("stars");

for (let i = 0; i < 120; i++) {
  let star = document.createElement("div");
  star.className = "star";
  star.style.top = Math.random() * 100 + "vh";
  star.style.left = Math.random() * 100 + "vw";
  star.style.animationDuration = (Math.random() * 3 + 1) + "s";
  star.style.opacity = Math.random();
  starsContainer.appendChild(star);
}

setTimeout(() => {
  document.getElementById("loadingScreen").style.display = "none";
  document.getElementById("main").style.display = "flex";
  typeWriter();
}, 2500);

const segments = [
  { text: "ilyas@system:~$", class: "purple" },
  { text: " why?\n\n", class: "gray" },
  { text: "Ilyas :", class: "ilyas" },
  { text: "السلام عليكم ورحمة الله وبركاته حياكم الديسكورد ", class: "" }
];

let segIndex = 0;
let charIndex = 0;
let currentSpan;

function typeWriter() {
  if (segIndex >= segments.length) return;

  let seg = segments[segIndex];

  if (charIndex < seg.text.length) {

    let container = document.getElementById("typing");

    if (charIndex === 0) {
      currentSpan = document.createElement("span");
      if (seg.class) currentSpan.className = seg.class;
      container.appendChild(currentSpan);
    }

    currentSpan.innerHTML += seg.text.charAt(charIndex);
    charIndex++;

    setTimeout(typeWriter, 18);

  } else {
    segIndex++;
    charIndex = 0;
    setTimeout(typeWriter, 120);
  }
}

</script>

</body>
</html>
